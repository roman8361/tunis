events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:3000;
    }

    upstream web {
        server web:80;
    }

    server {
        listen 80;
        server_name tunisvolley.ru www.tunisvolley.ru;

        client_max_body_size 10m;

        # Block common scanner/probe paths
        location ~* /\.git(/|$)        { return 404; }
        location ~* /\.env(\..*)?$      { return 404; }
        location ~* /\.svn(/|$)        { return 404; }
        location ~* /\.hg(/|$)         { return 404; }
        location ~* /\.DS_Store$       { return 404; }
        location ~* /wp-admin(/|$)     { return 404; }
        location ~* /wordpress(/|$)    { return 404; }
        location ~* /wp-login\.php$    { return 404; }
        location ~* /wp-content(/|$)   { return 404; }
        location ~* /wp-includes(/|$)  { return 404; }
        location ~* /xmlrpc\.php$      { return 404; }
        location ~* /phpmyadmin(/|$)   { return 404; }
        location ~* /phpinfo\.php$     { return 404; }
        location ~* \.(asp|aspx|jsp|cgi)$ { return 404; }

        location /api/ {
            proxy_pass         http://api/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass         http://web/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
